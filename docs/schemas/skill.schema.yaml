$schema: "https://json-schema.org/draft/2020-12/schema"
title: SkillManifest
type: object
required: [name, description]
additionalProperties: true
properties:
  name:
    type: string
    pattern: "^[a-z0-9-]+$"
    minLength: 3
    maxLength: 64
  description:
    type: string
    minLength: 10
    maxLength: 300
  io_contract:
    type: object
    additionalProperties: false
    properties:
      reads:
        type: array
        items: { type: string }
      writes:
        type: array
        items: { type: string }
      returns:
        type: string
  modes:
    type: array
    items:
      type: string
      enum: [interactive, headless]
  tiers:
    type: array
    items:
      type: string
      enum: [line, brief, full]
